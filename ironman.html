<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Ironman"/>
<meta name="theme-color" content="#000000"/>
<title>Ironman Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#000000;
    --surface:#0c0c0d;
    --surface2:#141416;
    --border:#1f1f22;
    --border2:#2a2a2e;
    --text:#fafafa;
    --muted:#7a7a80;
    --muted2:#48484e;
    --red:#e5283d;
    --red-dim:#ff4d5e;
    --red-bg:#16060a;
    /* Activity type colors — restrained red-family, distinguished by subtle hue shift */
    --run:#ff7a5c;
    --run-bg:#150b08;
    --bike:#ef4757;
    --bike-bg:#140709;
    --brick:#e5283d;
    --brick-bg:#140609;
    --strength:#b23a48;
    --strength-bg:#100608;
    --swim:#ff9d8a;
    --swim-bg:#160c0a;
    --rest:#5a5a62;
    --rest-bg:#0d0d0f;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
    --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --display:'Archivo','Inter',sans-serif;
  }
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);letter-spacing:-0.01em;-webkit-font-smoothing:antialiased}

  /* ── LAYOUT ── */
  #app{display:flex;flex-direction:column;height:100%;height:100dvh}
  #header{flex-shrink:0;padding:calc(var(--safe-top) + 14px) 18px 13px;background:var(--bg);border-bottom:1px solid var(--border)}
  #nav{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
  #nav::-webkit-scrollbar{display:none}
  #scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:calc(var(--safe-bot) + 24px)}

  /* ── HEADER ── */
  .hdr-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .hdr-title{font-family:var(--display);font-size:19px;font-weight:800;letter-spacing:-0.02em;color:#fff;text-transform:uppercase}
  .hdr-sub{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500;letter-spacing:0}
  .hdr-badge{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;color:var(--text);white-space:nowrap}
  .hdr-dot{width:6px;height:6px;border-radius:50%;animation:pulse 2.4s ease-in-out infinite;background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}

  /* ── PHASE TABS ── */
  .phase-tab{flex:none;padding:11px 15px;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;color:var(--muted2);min-width:0}
  .phase-tab.active{border-bottom-color:var(--red);color:#fff}
  .phase-tab-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em}
  .phase-tab-sub{font-size:10px;margin-top:3px;white-space:nowrap;font-weight:500}

  /* ── WEEK STRIP ── */
  .week-strip{display:flex;gap:7px;padding:13px 18px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface)}
  .week-strip::-webkit-scrollbar{display:none}
  .wk-btn{flex-shrink:0;width:46px;height:46px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.18s;position:relative}
  .wk-btn.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 0 3px rgba(229,40,61,0.15)}
  .wk-btn.today-week{border-color:var(--red);color:var(--red-dim)}
  .wk-btn.deload{border-style:dashed;border-color:var(--muted2)}
  .wk-num{font-size:14px;font-weight:800;font-family:var(--display)}
  .deload-pip{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:0.7}

  /* ── WEEK HEADER ── */
  .week-hdr{padding:18px 18px 12px}
  .week-hdr-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:11px}
  .week-title{font-family:var(--display);font-size:26px;font-weight:900;letter-spacing:-0.02em;color:#fff;text-transform:uppercase}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:0.05em}
  .focus-bar{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--red);border-radius:0 10px 10px 0;padding:12px 14px;font-size:13px;color:#b0b0b6;line-height:1.65}

  /* ── TODAY CALLOUT ── */
  .today-callout{margin:0 18px 11px;background:var(--red-bg);border:1px solid rgba(229,40,61,0.35);border-radius:12px;padding:12px 14px}
  .today-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--red-dim);margin-bottom:7px}
  .today-sessions{display:flex;gap:6px;flex-wrap:wrap}

  /* ── PROGRESS BAR ── */
  .prog-wrap{padding:0 18px 12px}
  .prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:7px;font-weight:500}
  .prog-track{height:3px;background:var(--border);border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(.4,0,.2,1);background:var(--red)}

  /* ── DAY CARDS ── */
  .days-list{display:flex;flex-direction:column;gap:7px;padding:0 18px}
  .day-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all 0.18s}
  .day-card.today-card{border-color:rgba(229,40,61,0.4);background:linear-gradient(180deg,rgba(229,40,61,0.04),transparent 60%)}
  .day-header{display:flex;align-items:center;gap:12px;padding:14px 15px;cursor:pointer;user-select:none}
  .day-name{width:30px;flex-shrink:0;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .day-name.today-name{color:var(--red-dim)}
  .day-pills{flex:1;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .day-chevron{color:var(--muted2);font-size:11px;flex-shrink:0;transition:transform 0.25s;line-height:1}
  .day-chevron.open{transform:rotate(180deg)}

  /* ── TYPE PILL ── */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 9px;border-radius:7px;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
  .pill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
  .p-run{background:var(--run-bg);color:var(--run);border:1px solid rgba(255,122,92,0.2)}
  .p-bike{background:var(--bike-bg);color:var(--bike);border:1px solid rgba(239,71,87,0.2)}
  .p-brick{background:var(--brick-bg);color:var(--brick);border:1px solid rgba(229,40,61,0.2)}
  .p-strength{background:var(--strength-bg);color:var(--strength);border:1px solid rgba(178,58,72,0.25)}
  .p-swim{background:var(--swim-bg);color:var(--swim);border:1px solid rgba(255,157,138,0.2)}
  .p-rest{background:var(--rest-bg);color:var(--rest);border:1px solid rgba(90,90,98,0.25)}

  /* ── EXPANDED SESSIONS ── */
  .day-body{padding:2px 15px 14px;display:flex;flex-direction:column;gap:9px;border-top:1px solid var(--border);margin-top:2px;padding-top:13px}
  .session-block{border-radius:12px;padding:12px 13px;border:1px solid transparent}
  .s-run{background:var(--run-bg);border-color:rgba(255,122,92,0.12)}
  .s-bike{background:var(--bike-bg);border-color:rgba(239,71,87,0.12)}
  .s-brick{background:var(--brick-bg);border-color:rgba(229,40,61,0.12)}
  .s-strength{background:var(--strength-bg);border-color:rgba(178,58,72,0.12)}
  .s-swim{background:var(--swim-bg);border-color:rgba(255,157,138,0.12)}
  .s-rest{background:var(--rest-bg);border-color:rgba(90,90,98,0.12)}

  .session-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:8px}
  .session-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .session-time{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px;font-weight:500}

  /* ── COMPLETE BUTTON ── */
  .complete-btn{flex-shrink:0;width:30px;height:30px;border-radius:9px;border:1.5px solid currentColor;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s;position:relative;opacity:0.55}
  .complete-btn.done{background:currentColor;border-color:currentColor;opacity:1}
  .complete-btn.done::after{content:'✓';position:absolute;color:#000;font-size:14px;font-weight:900}

  /* ── SETS LIST ── */
  .sets-list{list-style:none;padding:0}
  .sets-list li{font-size:13px;color:#9a9aa0;line-height:1.7;padding-left:15px;position:relative}
  .sets-list li::before{content:'';position:absolute;left:3px;top:10px;width:4px;height:1px;background:var(--muted2)}

  /* ── COACH NOTE ── */
  .coach-note{margin:14px 18px 0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;gap:9px;align-items:flex-start}
  .coach-note span{font-size:12px;color:var(--muted);line-height:1.65}

  /* ── TAPER CARD ── */
  .taper-card{margin:12px 14px 0;background:var(--red-bg);border:1px solid var(--red)55;border-radius:12px;padding:14px}
  .taper-title{font-size:13px;font-weight:800;color:var(--red);margin-bottom:10px}
  .taper-row{display:flex;gap:10px;font-size:12px;margin-bottom:5px}
  .taper-wk{font-weight:700;color:var(--red-dim);min-width:110px}
  .taper-desc{color:var(--muted)}

  /* ── INSTALL HINT ── */
  .install-hint{margin:12px 14px 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted);line-height:1.6;text-align:center}

  /* ── DOUBLE BADGE ── */
  .double-badge{font-size:10px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-weight:700;letter-spacing:0.3px}

  /* ── COMPLETED OVERLAY ── */
  .session-block.completed{opacity:0.45}
  .session-block.completed .sets-list li{text-decoration:line-through;color:var(--muted2)}

  /* Toast */
  #toast{position:fixed;bottom:calc(var(--safe-bot)+24px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--red);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;color:#fff;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:99}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── VIEW SWITCHER ── */
  #viewswitch{flex-shrink:0;display:flex;gap:5px;padding:11px 18px;background:var(--bg);border-bottom:1px solid var(--border)}
  .vbtn{flex:1;padding:10px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:-0.01em}
  .vbtn.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 0 3px rgba(229,40,61,0.12)}

  /* ── SCIENCE / ZONES ── */
  .sci-wrap{padding:18px 18px calc(var(--safe-bot) + 32px)}
  .sci-h2{font-family:var(--display);font-size:26px;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px;text-transform:uppercase}
  .sci-intro{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:18px}
  .sci-divider{font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.12em;margin:24px 0 13px;padding-bottom:7px;border-bottom:1px solid var(--border)}

  .zone-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0;margin-bottom:10px;overflow:hidden}
  .zone-bar{height:5px}
  .zone-body{padding:13px 14px}
  .zone-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
  .zone-name{font-size:14px;font-weight:800}
  .zone-hr{font-size:13px;font-weight:800;white-space:nowrap}
  .zone-pct{font-size:11px;color:var(--muted2);margin-bottom:6px}
  .zone-purpose{font-size:12px;color:#bbb;line-height:1.6}
  .zone-purpose b{color:#fff}
  .zone-feel{font-size:11px;color:var(--muted);margin-top:6px;font-style:italic}

  /* ── EDITABLE HR INPUTS ── */
  .hr-inputs{display:flex;gap:8px;align-items:stretch;margin-bottom:16px}
  .hr-in{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center}
  .hr-in label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px}
  .hr-stepper{display:flex;align-items:center;gap:4px}
  .hr-stepper button{width:28px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--red-dim);font-size:18px;font-weight:800;cursor:pointer;flex-shrink:0;line-height:1}
  .hr-stepper input{width:100%;background:transparent;border:none;color:#fff;font-family:var(--display);font-size:21px;font-weight:900;text-align:center;-moz-appearance:textfield}
  .hr-stepper input::-webkit-outer-spin-button,.hr-stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .hr-reserve{flex:0 0 70px;background:var(--red-bg);border:1px solid rgba(229,40,61,0.25);border-radius:12px;padding:10px 6px;text-align:center;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;display:flex;flex-direction:column;justify-content:center}
  .hr-reserve b{font-family:var(--display);font-size:23px;font-weight:900;color:var(--red-dim);margin-top:3px}

  /* ── VISUAL ZONE CHART ── */
  .zchart{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 14px 10px}
  .zrow{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .zrow:last-child{margin-bottom:0}
  .zrow-tag{flex:0 0 42px;text-align:center;font-size:11px;font-weight:800;color:#000;padding:5px 0;border-radius:7px}
  .zrow-mid{flex:1;min-width:0}
  .zrow-name{font-size:12px;font-weight:700;color:#ddd;margin-bottom:4px}
  .zrow-track{height:9px;background:var(--surface2);border-radius:5px;overflow:hidden}
  .zrow-fill{height:100%;border-radius:5px;transition:width .3s ease}
  .zrow-hr{flex:0 0 76px;text-align:right;font-family:var(--display);font-size:13px;font-weight:800;white-space:nowrap}
  .zchart-note{font-size:11px;color:var(--muted2);line-height:1.5;margin-top:10px;padding:0 2px}

  /* ── ACCORDION ── */
  .acc{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer}
  .acc-head{display:flex;align-items:center;gap:9px;padding:13px 14px}
  .acc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .acc-icon{font-size:16px;flex-shrink:0}
  .acc-title{flex:1;font-size:13px;font-weight:800;color:#fff}
  .acc-hr{font-size:12px;font-weight:800;white-space:nowrap}
  .acc-chev{font-size:12px;color:var(--muted2);transition:transform .2s;flex-shrink:0}
  .acc-body{padding:0 14px 14px;border-top:1px solid var(--border);padding-top:12px}
  .acc-body p{font-size:13px;color:#bbb;line-height:1.7;margin-bottom:8px}
  .acc-body p:last-child{margin-bottom:0}
  .acc-body p b{color:#fff}
  .acc-feel{font-size:12px!important;color:var(--muted)!important;font-style:italic}
  .acc-body ul{list-style:none;margin:4px 0}
  .acc-body ul li{font-size:13px;color:#bbb;line-height:1.6;padding-left:18px;position:relative;margin-bottom:6px}
  .acc-body ul li::before{content:'›';position:absolute;left:5px;color:var(--red);font-weight:900}
  .acc-body ul li b{color:#fff}

  .sci-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
  .sci-card.accent{border-left:3px solid var(--red)}
  .sci-card-t{font-size:14px;font-weight:800;margin-bottom:9px;display:flex;align-items:center;gap:8px}
  .sci-card p{font-size:13px;color:#bbb;line-height:1.7;margin-bottom:8px}
  .sci-card p:last-child{margin-bottom:0}
  .sci-card p b{color:#fff}
  .sci-card ul{list-style:none;margin-top:4px}
  .sci-card ul li{font-size:13px;color:#bbb;line-height:1.65;padding-left:18px;position:relative;margin-bottom:6px}
  .sci-card ul li::before{content:'›';position:absolute;left:5px;color:var(--red);font-weight:900}
  .sci-card ul li b{color:#fff}

  .callout-sci{border-radius:10px;padding:12px;margin-bottom:12px}
  .cs-amber{background:#1a1200;border:1px solid #f59e0b44}
  .cs-green{background:#0a1a0f;border:1px solid #22c55e44}
  .cs-red{background:var(--red-bg);border:1px solid #e5353544}
  .cs-t{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .cs-t.a{color:var(--amber)}.cs-t.g{color:#22c55e}.cs-t.r{color:var(--red-dim)}
  .callout-sci p{font-size:13px;color:#ccc;line-height:1.65}
  .callout-sci p b{color:#fff}

  /* ── READINESS ── */
  .rq{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
  .rq-label{font-size:13px;font-weight:700;margin-bottom:10px}
  .rq-hint{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:3px}
  .rq-opts{display:flex;gap:6px}
  .rq-opts-4{flex-wrap:wrap}
  .rq-opts-4 .rq-opt{flex:1 1 calc(50% - 3px);min-width:calc(50% - 3px)}
  .rq-opt{flex:1;padding:11px 4px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;text-align:center}
  .rq-opt.sel-g{background:#0a2a14;border-color:#22c55e;color:#22c55e}
  .rq-opt.sel-a{background:#2a1f00;border-color:#f59e0b;color:#f59e0b}
  .rq-opt.sel-r{background:#2a0808;border-color:var(--red);color:var(--red-dim)}

  #verdict{border-radius:12px;padding:16px;margin:14px 0;text-align:center;display:none}
  #verdict.show{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .v-green{background:#0a2a14;border:1.5px solid #22c55e}
  .v-amber{background:#2a1f00;border:1.5px solid #f59e0b}
  .v-red{background:#2a0808;border:1.5px solid var(--red)}
  .v-title{font-size:18px;font-weight:900;margin-bottom:6px}
  .v-title.g{color:#22c55e}.v-title.a{color:#f59e0b}.v-title.r{color:var(--red-dim)}
  .v-action{font-size:13px;color:#ddd;line-height:1.6}
  .v-action b{color:#fff}
  .rbtn{width:100%;padding:13px;border-radius:11px;border:none;background:var(--red);color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-top:6px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hdr-row">
      <div>
        <div class="hdr-title">Ironman Training</div>
        <div class="hdr-sub" id="hdr-sub">Loading…</div>
      </div>
      <div class="hdr-badge">
        <span class="hdr-dot" id="live-dot"></span>
        <span id="hdr-today"></span>
      </div>
    </div>
  </div>
  <div id="viewswitch">
    <button class="vbtn active" id="vb-plan" onclick="switchView('plan')">📋 Plan</button>
    <button class="vbtn" id="vb-zones" onclick="switchView('zones')">📊 Zones &amp; Science</button>
    <button class="vbtn" id="vb-ready" onclick="switchView('ready')">🔋 Readiness</button>
  </div>

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = { phase: 0, weekIdx: 0, done: {} };

function getStorage() {
  try {
    const raw = localStorage.getItem('im_done');
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveStorage() {
  try { localStorage.setItem('im_done', JSON.stringify(state.done)); } catch {}
}
function sessionKey(wk, dayIdx, sIdx) { return `w${wk}_d${dayIdx}_s${sIdx}`; }

// Figure out current program week (1-based)
function currentProgramWeek() {
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.floor((now - PROGRAM_START) / 86400000);
  const wk = Math.floor(diff / 7) + 1;
  return Math.max(1, Math.min(21, wk));
}
function currentDayOfWeek() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  // Return index into DAYS array (Mon=0..Sun=6)
  return day === 0 ? 6 : day - 1;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const pillClass = t => `pill p-${t}`;
const sessionClass = t => `session-block s-${t}`;
const typeColor = t => ({run:'var(--run)',bike:'var(--bike)',brick:'var(--brick)',strength:'var(--strength)',swim:'var(--swim)',rest:'var(--rest)'}[t]||'var(--rest)');

function phaseOf(wk) {
  const idx = PHASES.findIndex(p => wk >= p.range[0] && wk <= p.range[1]);
  return idx >= 0 ? idx : 0; // default to phase 0 if out of range
}

function render() {
  try {
  const curProgramWeek = currentProgramWeek();
  const curDayIdx = currentDayOfWeek();
  const pc = '#e53535'; // always red
  const phaseWeeks = W.filter(w => w.ph === state.phase);
  const week = phaseWeeks[state.weekIdx] || phaseWeeks[0];
  if (!week) return;
  const isCurWeek = week.wk === curProgramWeek;

  // Header
  const dtr = daysToRace();
  const raceStr = dtr > 0 ? `${dtr} days to race day` : dtr === 0 ? '🔥 RACE DAY' : 'Race complete';
  const phaseLabel = PHASES[phaseOf(curProgramWeek)]?.label || 'Phase 1';
  document.getElementById('hdr-sub').textContent =
    `Week ${curProgramWeek} of 21 · ${phaseLabel} · ${raceStr}`;
  const todayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const now = new Date();
  document.getElementById('hdr-today').textContent =
    todayNames[now.getDay()] + ' ' + now.toLocaleDateString('en-US',{month:'short',day:'numeric'});

  // Phase nav
  const nav = document.getElementById('nav');
  nav.innerHTML = PHASES.map((p,i) => `
    <button class="phase-tab${state.phase===i?' active':''}" onclick="selectPhase(${i})">
      <div class="phase-tab-label" style="color:${state.phase===i?'#e53535':''}">
        ${p.weeks}
      </div>
      <div class="phase-tab-sub">${p.label}</div>
    </button>`).join('');

  // Week strip
  document.getElementById('week-strip-wrap').innerHTML = `
    <div class="week-strip">
      ${phaseWeeks.map((w,i) => {
        const isCur = w.wk === curProgramWeek;
        const isActive = i === state.weekIdx;
        return `<button class="wk-btn${isActive?' active':''}${isCur&&!isActive?' today-week':''}${w.dl?' deload':''}"
          onclick="selectWeek(${i})"
          style="${isActive?`background:#e53535;border-color:#e53535;color:#fff`:''}">
          <span class="wk-num">${w.wk}</span>
          ${w.dl?'<span class="deload-pip"></span>':''}
        </button>`;
      }).join('')}
    </div>`;

  // Scroll active week into view
  setTimeout(() => {
    const strip = document.querySelector('.week-strip');
    const active = strip?.querySelector('.wk-btn.active');
    if (active && strip) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 50);

  // Completion progress
  const totalSessions = week.days.reduce((n,d) => n + d.s.length, 0);
  const doneSessions = week.days.reduce((n,d,di) =>
    n + d.s.filter((_,si) => state.done[sessionKey(week.wk,di,si)]).length, 0);
  const pct = totalSessions ? Math.round(doneSessions/totalSessions*100) : 0;

  // Today's sessions
  let todayHTML = '';
  if (isCurWeek) {
    const todayDay = week.days[curDayIdx];
    if (todayDay) {
      todayHTML = `<div class="today-callout" style="border-color:#e53535">
        <div class="today-label" style="color:#e53535">Today — ${todayDay.d}</div>
        <div class="today-sessions">
          ${todayDay.s.map(s => `<span class="pill ${pillClass(s.t)}">
            <span class="pill-dot" style="background:${typeColor(s.t)}"></span>${s.l}
          </span>`).join('')}
        </div>
      </div>`;
    }
  }

  // Day cards
  const daysHTML = week.days.map((day, di) => {
    const isToday = isCurWeek && di === curDayIdx;
    const realSlots = day.s.filter(s => s.t !== 'rest' || day.s.length === 1);
    const isDouble = realSlots.length > 1;
    const pillsHTML = realSlots.map(s =>
      `<span class="pill ${pillClass(s.t)}">
        <span class="pill-dot" style="background:${typeColor(s.t)}"></span>${s.l}
      </span>`).join('');

    const sessionsHTML = day.s.map((s,si) => {
      const key = sessionKey(week.wk,di,si);
      const isDone = !!state.done[key];
      const setsHTML = s.sets.map(line => `<li>${line}</li>`).join('');
      const timeLabel = s.w === 'AM' ? '🌅 Morning' : s.w === 'PM' ? '🌆 After 4:30 PM' : s.w;
      return `<div class="${sessionClass(s.t)}${isDone?' completed':''}">
        <div class="session-top">
          <div class="session-meta">
            <span class="pill ${pillClass(s.t)}">
              <span class="pill-dot" style="background:${typeColor(s.t)}"></span>${s.l}
            </span>
            <span class="session-time">${timeLabel}</span>
          </div>
          <button class="complete-btn${isDone?' done':''}"
            style="color:${typeColor(s.t)}"
            onclick="toggleDone(event,'${key}')"
            title="${isDone?'Mark incomplete':'Mark complete'}">

        </div>
        <ul class="sets-list">${setsHTML}</ul>
      </div>`;
    }).join('');

    return `<div class="day-card${isToday?' today-card':''}" id="day-${di}">
      <div class="day-header" onclick="toggleDay(${di})">
        <span class="day-name${isToday?' today-name':''}"${isToday?` style="color:#e53535"`:''}>${day.d}${isToday?' ●':''}</span>
        <div class="day-pills">
          ${pillsHTML}
          ${isDouble?`<span class="double-badge">DOUBLE</span>`:''}
        </div>
        <span class="day-chevron" id="chev-${di}">▾</span>
      </div>
      <div class="day-body" id="body-${di}" style="display:none">
        ${sessionsHTML}
      </div>
    </div>`;
  }).join('');

  // Install hint (only show once)
  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone = window.navigator.standalone;
  const installHint = (isIOS && !isStandalone)
    ? `<div class="install-hint">📱 Add to Home Screen: tap <strong>Share →</strong> then <strong>"Add to Home Screen"</strong> for the app experience</div>`
    : '';

  document.getElementById('week-content').innerHTML = `
    <div class="week-hdr">
      <div class="week-hdr-top">
        <span class="week-title">Week ${week.wk}</span>
        <span class="badge" style="background:#e5353522;color:#e53535">${PHASES[week.ph].label}</span>
        <span class="badge" style="background:var(--surface2);color:var(--muted)">${week.hrs}</span>
        ${week.dl?`<span class="badge" style="background:#1a1a1a;color:#888">Deload</span>`:''}
        ${isCurWeek?`<span class="badge" style="background:#e5353522;color:#e53535">Current Week</span>`:''}
      </div>
      <div class="focus-bar" style="border-left-color:#e53535">${week.focus}</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-label">
        <span>Week progress</span>
        <span style="color:#e53535;font-weight:700">${doneSessions}/${totalSessions} sessions · ${pct}%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:#e53535"></div></div>
    </div>
    ${todayHTML}
    <div class="days-list">${daysHTML}</div>
    ${week.note?`<div class="coach-note"><span style="font-size:18px">💬</span><span>${week.note}</span></div>`:''}
    <div class="taper-card">
      <div class="taper-title">🏁 Race Day — Nov 7, 2026 · ${daysToRace() > 0 ? daysToRace() + ' days away' : daysToRace() === 0 ? 'TODAY' : 'Done'}</div>
      <div class="taper-row"><span class="taper-wk">Wk 17 · Oct 5</span><span class="taper-desc">Final build week — last hard sessions before taper.</span></div>
      <div class="taper-row"><span class="taper-wk">Wk 18 · Oct 12</span><span class="taper-desc">Taper 1 — Peak week: 20-mile run, 6-hr brick, full IM swim. Last big effort.</span></div>
      <div class="taper-row"><span class="taper-wk">Wk 19 · Oct 19</span><span class="taper-desc">Taper 2 — Cut volume 40%. Keep quality, cut duration.</span></div>
      <div class="taper-row"><span class="taper-wk">Wk 20 · Oct 26</span><span class="taper-desc">Taper 3 — Cut volume 55%. Short sharp sessions only. Body is peaking.</span></div>
      <div class="taper-row"><span class="taper-wk">Wk 21 · Nov 2</span><span class="taper-desc">Race week: Mon swim · Tue run · Wed ride · Thu–Fri rest · Sat shakeout · <strong style="color:#ff4444">Sat Nov 7 — RACE DAY</strong>.</span></div>
    </div>
    ${installHint}
  `;

  // Auto-open today's day
  if (isCurWeek) {
    const todayBody = document.getElementById(`body-${curDayIdx}`);
    const todayChev = document.getElementById(`chev-${curDayIdx}`);
    if (todayBody) { todayBody.style.display = 'flex'; }
    if (todayChev) { todayChev.classList.add('open'); }
    setTimeout(() => {
      const todayCard = document.getElementById(`day-${curDayIdx}`);
      if (todayCard) todayCard.scrollIntoView({behavior:'smooth',block:'start'});
    }, 100);
  }
  } catch(e) {
    document.getElementById('hdr-sub').textContent = 'Tap a phase tab to load your plan';
    console.error('Render error:', e);
  }
}

// ─── HR ZONES (Karvonen-based, est. from sub-16 5K fitness) ──────────────────
// Estimated max HR ~191 (sub-16 5K runners typically 188-195); resting ~42 (VO2max 73).
// These are EDITABLE via field test. Defaults below; user can recalc.
function getHRConfig() {
  try {
    const raw = localStorage.getItem('im_hr');
    if (raw) return JSON.parse(raw);
  } catch {}
  return { maxHR: 210, restHR: 64, lthr: 185 }; // current numbers (post-layoff); RHR will drop as fitness returns
}
function saveHRConfig(c){ try{ localStorage.setItem('im_hr', JSON.stringify(c)); }catch{} }

// Karvonen: target = ((maxHR - restHR) * %intensity) + restHR
function karv(pct, c){ return Math.round((c.maxHR - c.restHR) * pct + c.restHR); }

const ZONE_DEFS = [
  { z:"Zone 1", name:"Recovery", color:"#3b82f6", lo:0.50, hi:0.60,
    purpose:"<b>Active recovery & fat oxidation.</b> Promotes blood flow to clear metabolic waste without adding training stress. Use on recovery spins and the day after hard sessions.",
    feel:"Conversational, almost too easy. You could do this all day." },
  { z:"Zone 2", name:"Aerobic Base", color:"#22c55e", lo:0.60, hi:0.70,
    purpose:"<b>The engine-builder.</b> Drives mitochondrial biogenesis, capillary density, and fat-burning efficiency. This is where 80% of your endurance is built. Most of your long rides and easy runs live here. Skipping Zone 2 to 'train harder' is the #1 amateur mistake.",
    feel:"Full sentences possible but you're working. Nose-breathing just about sustainable." },
  { z:"Zone 3", name:"Tempo", color:"#f59e0b", lo:0.70, hi:0.80,
    purpose:"<b>Aerobic threshold / 'sweet spot.'</b> Builds sustainable power and raises the ceiling of your aerobic system. High training value per hour, but costly to recover from — used deliberately, not constantly. The classic 'grey zone' if overused.",
    feel:"Short sentences only. Comfortably hard. You know you're working." },
  { z:"Zone 4", name:"Threshold", color:"#ef4444", lo:0.80, hi:0.90,
    purpose:"<b>Lactate threshold development.</b> Trains your body to clear lactate as fast as it's produced — directly raising the pace you can hold for hours. This is the single most race-specific intensity for long-course racing. Your threshold intervals target this.",
    feel:"A few words at most. Uncomfortable but sustainable for ~20-40 min." },
  { z:"Zone 5", name:"VO2max", color:"#a855f7", lo:0.90, hi:1.00,
    purpose:"<b>Maximal aerobic power.</b> Stresses your VO2max ceiling and stroke volume. Used sparingly via short intervals to keep your top-end sharp — but it's not the main driver for Ironman. Too much here digs a recovery hole.",
    feel:"Barely a word. Hard breathing. Only sustainable in short bursts." },
];

function renderZones() {
  const c = getHRConfig();
  const reserve = c.maxHR - c.restHR;

  // Build the visual stacked zone bar + per-zone rows
  let chartRows = '';
  ZONE_DEFS.forEach(z => {
    const loHR = karv(z.lo, c), hiHR = karv(z.hi, c);
    const widthPct = (z.hi - z.lo) * 100 / 0.50 * 100 / 100; // each zone spans 0.10 of a 0.50 range = 20%
    chartRows += `<div class="zrow">
      <div class="zrow-tag" style="background:${z.color}">${z.z}</div>
      <div class="zrow-mid">
        <div class="zrow-name">${z.name}</div>
        <div class="zrow-track"><div class="zrow-fill" style="width:${(z.hi-z.lo)/0.50*100}%;background:${z.color}"></div></div>
      </div>
      <div class="zrow-hr" style="color:${z.color}">${loHR}–${hiHR}</div>
    </div>`;
  });

  // Visual vertical bar chart (stacked zones, proportional)
  let barSegments = '';
  ZONE_DEFS.forEach(z => {
    barSegments += `<div class="vbar-seg" style="background:${z.color}" title="${z.name}: ${karv(z.lo,c)}-${karv(z.hi,c)}">
      <span class="vbar-lbl">${z.z.replace('Zone ','Z')}</span>
      <span class="vbar-hr">${karv(z.lo,c)}</span>
    </div>`;
  });

  let html = `<div class="sci-wrap">
    <div class="sci-h2">Heart Rate Zones</div>
    <p class="sci-intro">Calculated from your current numbers using the Karvonen (heart-rate-reserve) method. Edit either value below and every zone updates instantly — drop your resting HR as your fitness returns over the build.</p>

    <!-- EDITABLE INPUTS -->
    <div class="hr-inputs">
      <div class="hr-in">
        <label>Max HR</label>
        <div class="hr-stepper">
          <button onclick="adjustHR('maxHR',-1)">−</button>
          <input type="number" id="in-max" value="${c.maxHR}" onchange="setHR('maxHR',this.value)"/>
          <button onclick="adjustHR('maxHR',1)">+</button>
        </div>
      </div>
      <div class="hr-in">
        <label>Resting HR</label>
        <div class="hr-stepper">
          <button onclick="adjustHR('restHR',-1)">−</button>
          <input type="number" id="in-rest" value="${c.restHR}" onchange="setHR('restHR',this.value)"/>
          <button onclick="adjustHR('restHR',1)">+</button>
        </div>
      </div>
      <div class="hr-reserve">HR Reserve<br><b>${reserve}</b></div>
    </div>

    <!-- VISUAL ZONE CHART -->
    <div class="zchart">
      ${chartRows}
    </div>
    <div class="zchart-note">Each bar's length shows that zone's share of your usable HR range. Numbers are the bpm window.</div>

    <div class="sci-divider">Tap to Explore the Science</div>`;

  // Collapsible: each zone's purpose
  ZONE_DEFS.forEach((z,i) => {
    html += `<div class="acc" onclick="toggleAcc('z${i}')">
      <div class="acc-head">
        <span class="acc-dot" style="background:${z.color}"></span>
        <span class="acc-title">${z.z} · ${z.name}</span>
        <span class="acc-hr" style="color:${z.color}">${karv(z.lo,c)}–${karv(z.hi,c)}</span>
        <span class="acc-chev" id="chev-z${i}">▾</span>
      </div>
      <div class="acc-body" id="acc-z${i}" style="display:none">
        <p>${z.purpose}</p>
        <p class="acc-feel">💬 ${z.feel}</p>
      </div>
    </div>`;
  });

  // Collapsible: the bigger concepts
  const concepts = [
    { id:'polar', icon:'🎯', title:'The 80/20 Polarized Model', body:
      `<p>The biggest finding in endurance science: elites spend <b>~80% of training easy (Z1–2)</b> and only ~20% hard (Z4–5), with little in the middle. This is <b>polarized training</b>.</p>
       <p>Easy volume builds the aerobic machinery — mitochondria, capillaries, fat metabolism — without the fatigue that limits how much you can do. Hard intervals deliver the high-end stimulus. The <b>middle (Z3)</b> feels productive but is the 'grey zone': too hard to recover from, too easy to drive peak adaptation.</p>
       <p><b>Resist making easy days moderate.</b> That discipline is what separates this from a junk-volume plan.</p>` },
    { id:'sessions', icon:'🔬', title:'What Each Session Builds', body:
      `<ul>
        <li><b>Long Ride / Run (Z2):</b> mitochondrial growth, capillarization, glycogen storage, fat oxidation, tendon durability.</li>
        <li><b>Tempo (Z3):</b> raises aerobic threshold & muscular endurance.</li>
        <li><b>Threshold (Z4):</b> boosts lactate clearance and lifts the pace you can hold for hours — most race-specific.</li>
        <li><b>VO2 intervals (Z5):</b> expands max oxygen uptake & stroke volume.</li>
        <li><b>Brick:</b> trains the bike→run neuromuscular shift and rehearses fueling.</li>
        <li><b>Swim technique:</b> economy (drag reduction) beats fitness — why technique is front-loaded.</li>
      </ul>` },
    { id:'field', icon:'🧪', title:'Field Test — Set Your True Zones', body:
      `<p>Estimates get you started; a field test makes the zones <b>yours</b>. After a full warm-up, run or bike <b>30 min all-out and steady</b> on a flat course. Lap at 10 min. Your <b>average HR over the final 20 min = your Lactate Threshold HR (LTHR)</b>.</p>
       <p>Then zones snap to LTHR (more accurate for threshold than %max):</p>
       <ul>
         <li><b>Z1:</b> &lt;81% LTHR</li>
         <li><b>Z2:</b> 81–89%</li>
         <li><b>Z3:</b> 90–94%</li>
         <li><b>Z4:</b> 95–99%</li>
         <li><b>Z5:</b> 100%+</li>
       </ul>
       <p>Retest every 6–8 weeks — as you get fitter, zones shift. Swim/bike thresholds run ~5–10 bpm below run.</p>` },
    { id:'rpe', icon:'💡', title:'RPE Cross-Check', body:
      `<p>HR lags effort 1–2 min, drifts up in heat, and rises with fatigue & dehydration — all relevant on your job. Pair the number with <b>RPE (1–10)</b>: Z2 ≈ 3–4, Z3 ≈ 5–6, Z4 ≈ 7–8, Z5 ≈ 9. If HR says easy but RPE says hard (common after a brutal work day), <b>trust RPE and back off.</b></p>` },
  ];
  concepts.forEach(con => {
    html += `<div class="acc" onclick="toggleAcc('${con.id}')">
      <div class="acc-head">
        <span class="acc-icon">${con.icon}</span>
        <span class="acc-title">${con.title}</span>
        <span class="acc-chev" id="chev-${con.id}">▾</span>
      </div>
      <div class="acc-body" id="acc-${con.id}" style="display:none">${con.body}</div>
    </div>`;
  });

  html += `</div>`;
  document.getElementById('zones-content').innerHTML = html;
}

function toggleAcc(id) {
  const body = document.getElementById('acc-'+id);
  const chev = document.getElementById('chev-'+id);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.style.transform = open ? 'none' : 'rotate(180deg)';
}

function setHR(key, val) {
  const c = getHRConfig();
  let n = parseInt(val,10);
  if (isNaN(n)) return;
  // sane clamps
  if (key==='maxHR') n = Math.max(150, Math.min(220, n));
  if (key==='restHR') n = Math.max(30, Math.min(90, n));
  c[key] = n;
  // keep maxHR > restHR
  if (c.maxHR - c.restHR < 40) { showToast('Max must exceed rest by 40+'); return; }
  saveHRConfig(c);
  renderZones();
}
function adjustHR(key, delta) {
  const c = getHRConfig();
  setHR(key, c[key] + delta);
}



// ─── READINESS CHECK (WHOOP-based autoregulation) ────────────────────────────
// Primary signal = WHOOP Recovery % (already blends HRV, RHR, sleep, respiratory rate).
// Secondary = sleep performance, HRV trend, RHR trend, plus user's work strain & knee.
const READY_Q = [
  { id:'recovery', label:'WHOOP Recovery Score', hint:'The headline % WHOOP shows you', opts:[
    {t:'Green (67–100%)', v:0}, {t:'Yellow (34–66%)', v:1}, {t:'Red (1–33%)', v:2} ] },
  { id:'hrv', label:'HRV vs your baseline', hint:'WHOOP shows this on the recovery screen', opts:[
    {t:'At or above', v:0}, {t:'Slightly below', v:1}, {t:'Well below', v:2} ] },
  { id:'rhr', label:'Resting HR vs baseline', hint:'WHOOP resting heart rate', opts:[
    {t:'At or below', v:0}, {t:'Up 2–4 bpm', v:1}, {t:'Up 5+ bpm', v:2} ] },
  { id:'sleep', label:'Sleep Performance', hint:'WHOOP sleep % vs need', opts:[
    {t:'85%+ ', v:0}, {t:'70–85%', v:1}, {t:'Under 70%', v:2} ] },
  { id:'work', label:'How taxing was work yesterday?', hint:'Your construction load — counts as training stress', opts:[
    {t:'Light / off', v:0}, {t:'Normal day', v:1}, {t:'Long', v:2}, {t:'Brutal', v:3} ] },
  { id:'knee', label:'Knees (patellar / ITB)', hint:'Your specific injury watch', opts:[
    {t:'No pain', v:0}, {t:'Mild niggle', v:1}, {t:'Painful / swollen', v:2} ] },
];
let readyState = {};

function renderReady() {
  let html = `<div class="sci-wrap">
    <div class="sci-h2">WHOOP Readiness</div>
    <p class="sci-intro">Pull up WHOOP when you wake and feed in your morning numbers. WHOOP Recovery already blends HRV, resting HR, sleep, and respiratory rate into one validated score — so it's weighted heaviest here. Your work strain and knee status layer on top, since construction is a training load WHOOP can't fully see. The verdict adjusts or confirms today's session.</p>`;

  READY_Q.forEach(q => {
    const nopt = q.opts.length;
    html += `<div class="rq">
      <div class="rq-label">${q.label}${q.hint?`<span class="rq-hint">${q.hint}</span>`:''}</div>
      <div class="rq-opts${nopt>3?' rq-opts-4':''}">
        ${q.opts.map((o,i)=>`<button class="rq-opt" id="opt-${q.id}-${i}" onclick="pickReady('${q.id}',${i},${o.v})">${o.t}</button>`).join('')}
      </div>
    </div>`;
  });

  html += `<div id="verdict"></div>
    <button class="rbtn" onclick="calcReady()">Get My Verdict</button>

    <div class="sci-divider">How the WHOOP Logic Works</div>
    <div class="sci-card accent">
      <div class="sci-card-t">⚙️ Why WHOOP Recovery Leads</div>
      <p>WHOOP Recovery is a single percentage built from <b>heart rate variability (HRV), resting heart rate, sleep, and respiratory rate</b> — the same autonomic-nervous-system signals sports scientists use to gauge recovery. A high HRV and low RHR mean your parasympathetic ('rest and digest') system is in charge and you're ready to absorb hard training. Suppressed HRV with elevated RHR is the classic fingerprint of incomplete recovery or accumulating stress.</p>
      <p>Because Recovery already integrates those signals, it's the <b>primary input</b>. But WHOOP can't fully weigh the mechanical load of swinging tools for ten hours, and it doesn't know your knees ache — so your <b>work strain and knee status can override an otherwise-green score.</b> That combination is what makes this genuinely tuned to you.</p>
    </div>
    <div class="callout-sci cs-green">
      <div class="cs-t g">✅ Green — Full Send</div>
      <p>Recovery is high and the supporting signals agree. Execute today's prescribed session as written, hard efforts included. Green days are when adaptation happens — commit fully.</p>
    </div>
    <div class="callout-sci cs-amber">
      <div class="cs-t a">🟡 Amber — Modify</div>
      <p>Partial recovery, or a strong WHOOP score undercut by a brutal work day. Keep the session but pull intensity down a notch — hard efforts to moderate, or cut interval volume ~30%. Or swap a quality session for easy Zone 2. Move, but don't pile on fatigue.</p>
    </div>
    <div class="callout-sci cs-red">
      <div class="cs-t r">🔴 Red — Rest or Recover</div>
      <p>Recovery is low or a red flag (painful knee, red WHOOP, crushed sleep) is present. Take a full rest day or easy Zone 1 movement only. This protects your key weekend sessions and keeps the knees healthy — it's a training decision, not weakness.</p>
    </div>
    <div class="callout-sci cs-amber">
      <div class="cs-t a">🧱 The Work-Strain Override</div>
      <p>A green WHOOP after a brutal day on site is a trap: HRV can read fine while your legs and connective tissue are mechanically trashed. When work was <b>brutal</b>, this tool caps your verdict at Amber even on a green score — protecting you from the hidden load that WHOOP underweights.</p>
    </div>
  </div>`;

  document.getElementById('ready-content').innerHTML = html;
  Object.keys(readyState).forEach(id=>{
    const i = readyState[id].i, v = readyState[id].v;
    const el = document.getElementById(`opt-${id}-${i}`);
    if (el) el.classList.add(v===0?'sel-g':(v===1?'sel-a':'sel-r'));
  });
}

function pickReady(id, i, v) {
  const q = READY_Q.find(q=>q.id===id);
  q.opts.forEach((_,j)=>{
    const el=document.getElementById(`opt-${id}-${j}`);
    if(el) el.classList.remove('sel-g','sel-a','sel-r');
  });
  const el=document.getElementById(`opt-${id}-${i}`);
  if(el) el.classList.add(v===0?'sel-g':(v===1?'sel-a':'sel-r'));
  readyState[id] = {i, v};
}

function calcReady() {
  const answered = Object.keys(readyState).length;
  if (answered < READY_Q.length) {
    showToast(`Answer all ${READY_Q.length} questions first`);
    return;
  }
  const r = readyState;
  const recovery = r.recovery.v;   // 0 green / 1 yellow / 2 red
  const work = r.work.v;           // 0-3
  const kneeRed = r.knee.v === 2;
  const sleepRed = r.sleep.v === 2;

  // Weighted score: WHOOP signals are primary. Work & knee handled as overrides.
  // Recovery x3 (heaviest), HRV x1.5, RHR x1.5, sleep x1.5
  const whoopScore = recovery*3 + r.hrv.v*1.5 + r.rhr.v*1.5 + r.sleep.v*1.5;
  // whoopScore max = 6 + 3 + 3 + 3 = 15

  const v = document.getElementById('verdict');
  let cls, title, action;

  // ---- HARD OVERRIDES ----
  if (kneeRed) {
    cls='v-red'; title=['r','🔴 Rest — Protect the Knee'];
    action='Painful or swollen knees override every other signal. Take a full rest day or non-impact mobility only. Pushing through patellar/ITB pain is how you lose race day — ice, elevate, reassess tomorrow.';
  } else if (recovery === 2) {
    cls='v-red'; title=['r','🔴 Red — WHOOP Says Recover'];
    action='A red WHOOP Recovery means your nervous system is under real strain. <b>Full rest or easy Zone 1 only.</b> Forcing quality work now deepens the hole and spikes injury risk. Trust the data.';
  } else if (sleepRed && recovery >= 1) {
    cls='v-red'; title=['r','🔴 Red — Sleep Too Low'];
    action='Sub-70% sleep on top of a sub-green recovery means adaptation won\'t stick and form will be sloppy. <b>Rest or easy movement</b>, and prioritise sleep tonight above all.';
  }
  // ---- WORK-STRAIN OVERRIDE (brutal day caps at Amber) ----
  else if (work === 3 && whoopScore <= 4) {
    cls='v-amber'; title=['a','🟡 Amber — Brutal Work Cap'];
    action='WHOOP looks good, but a brutal day on site mechanically loads your legs and tendons in ways it underweights. <b>Keep the session but ease intensity</b> — hard to moderate, or drop to easy Zone 2. Protect the connective tissue.';
  }
  // ---- NORMAL WHOOP-DRIVEN VERDICT ----
  else if (whoopScore <= 3 && work <= 1) {
    cls='v-green'; title=['g','🟢 Green — Full Send'];
    action='WHOOP and your supporting signals all agree you\'re recovered. <b>Execute today\'s session as written</b>, hard efforts included. This is when fitness is built — commit to it.';
  } else if (whoopScore <= 8) {
    cls='v-amber'; title=['a','🟡 Amber — Modify'];
    action='Partial recovery. <b>Keep the session but ease intensity</b>: drop hard efforts to moderate, or cut interval volume ~30%. If it\'s a quality day, consider swapping to easy Zone 2. Don\'t add fatigue.';
  } else {
    cls='v-red'; title=['r','🔴 Red — Rest or Recover'];
    action='The combined signals show incomplete recovery. <b>Take a full rest day or easy Zone 1 only.</b> Forcing a hard session now risks injury and overreaching. Rest is the decision that protects your weekend key sessions.';
  }

  v.className = cls + ' show';
  v.innerHTML = `<div class="v-title ${title[0]}">${title[1]}</div><div class="v-action">${action}</div>`;
  v.scrollIntoView({behavior:'smooth', block:'center'});
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
state.done = getStorage();

// Auto-navigate to current program week
const curWk = currentProgramWeek();
const curPh = phaseOf(curWk);
state.phase = curPh;
const phaseWeeks = W.filter(w => w.ph === curPh);
state.weekIdx = phaseWeeks.findIndex(w => w.wk === curWk);
if (state.weekIdx < 0) state.weekIdx = 0;

render();

// Update header clock every minute
setInterval(() => {
  const now = new Date();
  const names = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('hdr-today').textContent =
    names[now.getDay()] + ' ' + now.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const curProgramWeek = currentProgramWeek();
  const dtr = daysToRace();
  const raceStr = dtr > 0 ? `${dtr} days to race day` : dtr === 0 ? '🔥 RACE DAY' : 'Race complete';
  const phaseLabel = PHASES[phaseOf(curProgramWeek)]?.label || 'Phase 1';
  document.getElementById('hdr-sub').textContent =
    `Week ${curProgramWeek} of 21 · ${phaseLabel} · ${raceStr}`;
}, 60000);
</script>
